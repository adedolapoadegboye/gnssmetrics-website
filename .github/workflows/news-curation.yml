name: Daily GNSS News Curation

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC every day
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  curate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run news curation script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/curate-news.mjs

      - name: Commit and push new article
        run: |
          git config user.name "GNSSMetrics News Bot"
          git config user.email "bot@gnssmetrics.com"
          git add src/content/news/ news-cache.json
          git diff --staged --quiet || git commit -m "chore: auto news $(date +%Y-%m-%d)"
          git push
