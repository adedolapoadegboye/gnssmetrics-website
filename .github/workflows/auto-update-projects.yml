name: Auto-Update Project Cards

on:
  push:
    paths:
      - '_projects/**'
    branches:
      - main

  workflow_dispatch:
    inputs:
      project_file:
        description: 'Project file name (e.g., gps-multipath.md)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get new project files
        id: get-projects
        run: |
          if [ -n "${{ github.event.inputs.project_file }}" ]; then
            FILES="_projects/${{ github.event.inputs.project_file }}"
          else
            FILES=$(git diff --name-only HEAD~1 HEAD -- '_projects/*.md' 2>/dev/null || echo "")
            if [ -z "$FILES" ]; then
              FILES=$(ls _projects/*.md 2>/dev/null | head -5)
            fi
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Found files: $FILES"

      - name: Setup Node.js
        if: steps.get-projects.outputs.files != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        if: steps.get-projects.outputs.files != ''
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code to update site
        if: steps.get-projects.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "
          A new project file has been added to this repo.

          New file(s): ${{ steps.get-projects.outputs.files }}

          Your task:
          1. Read the CLAUDE.md file in the root of this repo for full instructions.
          2. Read the new project markdown file(s) in _projects/.
          3. Read existing project entries to understand the exact format and patterns used on this site.
          4. Add the new project following the existing patterns exactly.
          5. Do NOT modify any existing files — only add new content.
          6. Make sure the site would build successfully.

          IMPORTANT:
          - Match the existing code style exactly.
          - Only ADD content, never modify or delete existing content.
          - If unsure about anything, err on the side of doing less.
          " --allowedTools "Read,Write,Edit,Bash" --max-turns 15

      - name: Check for changes
        if: steps.get-projects.outputs.files != ''
        id: check-changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --stat
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes were made by Claude"
          fi

      - name: Create PR with changes
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          BRANCH="claude/add-project-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "feat: add new project card from _projects/"
          git push origin "$BRANCH"

          gh pr create \
            --title "Add new project: ${{ steps.get-projects.outputs.files }}" \
            --body "Auto-generated by Claude Code from project file(s) in \`_projects/\`.

          Please review the changes and merge if everything looks good.

          ---
          *This PR was created automatically by the Auto-Update Project Cards workflow.*" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # OPTIONAL: Auto-merge (uncomment when you trust the pipeline)
